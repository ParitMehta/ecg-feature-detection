name: Sync API to HF Space
on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git clone https://treehugger4:$HF_TOKEN@huggingface.co/spaces/treehugger4/ecg-api hf_space
          cd hf_space
          git config user.email "ci@github.com"
          git config user.name "GitHub CI"

          # sync all required files from GitHub repo
          rsync -av --delete ../api/       api/
          rsync -av --delete ../src/       src/
          cp ../Dockerfile.api             Dockerfile
          cp ../requirements.txt           requirements.txt

          git add -A
          git diff --cached --quiet || git commit -m "sync from GitHub ${{ github.sha }}"
          git push
